name: CI

on:
  push:
    branches:
      - main
      - hifi
      - "feature/**"
  pull_request:

jobs:
  build:
    name: Build (Linux)
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config \
            libgtk-4-dev \
            libadwaita-1-dev \
            libsecret-1-dev \
            libgstreamer1.0-dev \
            libgstreamer-plugins-base1.0-dev \
            libglib2.0-bin

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
          cache: true

      - name: go build
        env:
          CGO_ENABLED: "1"
        run: go build -v ./cmd/tonearm
