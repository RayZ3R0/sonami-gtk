name: CI

on:
  push:
    branches:
      - main
      - hifi
      - "feature/**"
  pull_request:

jobs:
  lint-and-build:
    name: Vet & Build (Linux)
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config \
            libgtk-4-dev \
            libadwaita-1-dev \
            libsecret-1-dev \
            libgstreamer1.0-dev \
            libgstreamer-plugins-base1.0-dev \
            libglib2.0-bin

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
          cache: true

      - name: go vet
        # Pre-existing upstream warnings exist (slog args, unsafe.Pointer patterns
        # from puregotk). This step reports findings but does NOT block the build.
        continue-on-error: true
        run: go vet ./...

      - name: go build
        env:
          CGO_ENABLED: "1"
        run: go build ./cmd/tonearm

  check-build-tags:
    name: Verify build tags (dry-run Windows)
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
          cache: true

      - name: Check package graph compiles for windows/amd64
        # CGO_ENABLED=0 + GOOS=windows validates the Go import graph with build
        # tags without needing Windows headers. If a platform stub is missing we
        # will see a "undefined: newService" or similar compile error here.
        env:
          CGO_ENABLED: "0"
          GOOS: windows
          GOARCH: amd64
        run: go build -v ./... 2>&1 | grep -v "^#" || true
