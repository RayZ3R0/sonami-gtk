name: Publish to AUR

on:
  release:
    types: [published]

jobs:
  aur-publish:
    name: Update AUR package
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest

    steps:
      - name: Install dependencies
        run: |
          pacman -Syu --noconfirm base-devel git openssh

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure SSH for AUR
        run: |
          mkdir -p /root/.ssh
          echo "${{ secrets.AUR_SSH_PRIVATE_KEY }}" > /root/.ssh/aur_ed25519
          chmod 600 /root/.ssh/aur_ed25519
          ssh-keyscan -t ed25519 aur.archlinux.org >> /root/.ssh/known_hosts 2>/dev/null
          cat > /root/.ssh/config << 'SSHEOF'
          Host aur.archlinux.org
            IdentityFile /root/.ssh/aur_ed25519
            User aur
            StrictHostKeyChecking accept-new
          SSHEOF
          chmod 600 /root/.ssh/config

      - name: Update PKGBUILD
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          TARBALL_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/tonearm-${TAG}-linux-x86_64.tar.gz"

          echo "==> Downloading tarball to compute sha256..."
          curl -fSL -o tarball.tar.gz "$TARBALL_URL"
          SHA256=$(sha256sum tarball.tar.gz | awk '{print $1}')
          rm tarball.tar.gz

          echo "==> Version: ${VERSION}"
          echo "==> SHA256:  ${SHA256}"

          cd aur

          # Update pkgver
          sed -i "s/^pkgver=.*/pkgver=${VERSION}/" PKGBUILD

          # Reset pkgrel to 1 for new version
          sed -i "s/^pkgrel=.*/pkgrel=1/" PKGBUILD

          # Update sha256sums
          sed -i "s/^sha256sums=.*/sha256sums=('${SHA256}')/" PKGBUILD

          echo "==> Updated PKGBUILD:"
          cat PKGBUILD

      - name: Generate .SRCINFO
        run: |
          cd aur

          # makepkg needs to run as non-root
          useradd -m builder
          chown -R builder:builder .
          su builder -c "makepkg --printsrcinfo" > .SRCINFO

          echo "==> Generated .SRCINFO:"
          cat .SRCINFO

      - name: Push to AUR
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"

          git config --global user.name "RayZ3R0"
          git config --global user.email "rayz3r0@users.noreply.github.com"

          # Clone existing AUR repo, or initialise a new one
          if git clone ssh://aur@aur.archlinux.org/tonearm-bin.git /tmp/aur-repo 2>/dev/null; then
            echo "==> Cloned existing AUR repo"
          else
            echo "==> AUR repo doesn't exist yet, creating fresh"
            mkdir -p /tmp/aur-repo
            cd /tmp/aur-repo
            git init
            git remote add origin ssh://aur@aur.archlinux.org/tonearm-bin.git
            cd -
          fi

          # Copy our generated files into the AUR repo
          cp aur/PKGBUILD /tmp/aur-repo/
          cp aur/.SRCINFO /tmp/aur-repo/

          cd /tmp/aur-repo
          git add PKGBUILD .SRCINFO
          git commit -m "Update to ${VERSION}"
          git push origin master
