name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  # ─────────────────────────────────────────────
  # Linux: native binary tarball
  # ─────────────────────────────────────────────
  linux-binary:
    name: Build binary (Linux x86_64)
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config \
            libgtk-4-dev \
            libadwaita-1-dev \
            libsecret-1-dev \
            libgstreamer1.0-dev \
            libgstreamer-plugins-base1.0-dev \
            gstreamer1.0-plugins-good \
            gstreamer1.0-plugins-bad \
            libglib2.0-bin \
            librsvg2-bin

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
          cache: true

      - name: Resolve version info
        id: ver
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          COMMIT="$(git rev-parse --short=7 HEAD)"
          echo "tag=${TAG}"         >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "commit=${COMMIT}"   >> "$GITHUB_OUTPUT"

      - name: Build binary
        env:
          CGO_ENABLED: "1"
          GOOS: linux
          GOARCH: amd64
        run: |
          go build \
            -ldflags="-s -w \
              -X 'codeberg.org/dergs/tonearm/internal/ui.Version=${{ steps.ver.outputs.version }}' \
              -X 'codeberg.org/dergs/tonearm/internal/ui.Commit=${{ steps.ver.outputs.commit }}'" \
            -trimpath \
            -o tonearm \
            ./cmd/tonearm

      - name: Compile GSettings schemas
        run: glib-compile-schemas internal/settings/

      - name: Bundle tarball
        run: |
          TAG="${{ steps.ver.outputs.tag }}"
          BUNDLE="tonearm-${TAG}-linux-x86_64"
          mkdir -p "$BUNDLE/share/icons/hicolor/scalable/apps"
          mkdir -p "$BUNDLE/share/icons/hicolor/128x128/apps"
          mkdir -p "$BUNDLE/share/icons/hicolor/symbolic/apps"
          mkdir -p "$BUNDLE/share/applications"
          mkdir -p "$BUNDLE/share/glib-2.0/schemas"
          mkdir -p "$BUNDLE/share/metainfo"

          cp tonearm "$BUNDLE/"
          cp build/dev.dergs.Tonearm.desktop "$BUNDLE/share/applications/"
          cp build/dev.dergs.Tonearm.metainfo.xml "$BUNDLE/share/metainfo/"
          cp internal/icons/hicolor/scalable/apps/dev.dergs.Tonearm.svg \
              "$BUNDLE/share/icons/hicolor/scalable/apps/"
          cp internal/icons/hicolor/128x128/apps/dev.dergs.Tonearm.png \
              "$BUNDLE/share/icons/hicolor/128x128/apps/"
          cp internal/icons/hicolor/symbolic/apps/dev.dergs.Tonearm-symbolic.svg \
              "$BUNDLE/share/icons/hicolor/symbolic/apps/"
          cp internal/settings/dev.dergs.Tonearm.gschema.xml \
              "$BUNDLE/share/glib-2.0/schemas/"

          cat > "$BUNDLE/README.txt" << 'EOF'
          Tonearm — Linux portable build
          ================================
          Run ./tonearm to launch.

          For a proper system install, copy the contents of share/ into
          /usr/local/share/ and run: glib-compile-schemas /usr/local/share/glib-2.0/schemas/
          EOF

          tar -czf "${BUNDLE}.tar.gz" "$BUNDLE"

      - name: Upload tarball
        uses: actions/upload-artifact@v4
        with:
          name: linux-binary
          path: "tonearm-${{ steps.ver.outputs.tag }}-linux-x86_64.tar.gz"

  # ─────────────────────────────────────────────
  # Linux: Flatpak bundle (using upstream container)
  # ─────────────────────────────────────────────
  linux-flatpak:
    name: Build Flatpak (Linux x86_64)
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-49
      options: --privileged

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Add Flathub repo
        run: flatpak remote-add --user --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo

      - name: Cache Flatpak builder
        uses: actions/cache@v4
        with:
          path: ~/.local/share/flatpak
          key: flatpak-builder-${{ hashFiles('build/flatpak/dev.dergs.Tonearm.yaml', 'build/flatpak/go.mod.yml') }}
          restore-keys: |
            flatpak-builder-

      - name: Build Flatpak
        run: |
          flatpak-builder --user --repo=repo --disable-rofiles-fuse \
            --install-deps-from=flathub \
            --force-clean --default-branch=master \
            flatpak_app build/flatpak/dev.dergs.Tonearm.yaml

      - name: Create bundle
        run: |
          flatpak build-bundle repo dev.dergs.Tonearm.flatpak \
            --runtime-repo=https://flathub.org/repo/flathub.flatpakrepo \
            --arch=x86_64 dev.dergs.Tonearm master

      - name: Upload Flatpak
        uses: actions/upload-artifact@v4
        with:
          name: linux-flatpak
          path: dev.dergs.Tonearm.flatpak

  # ─────────────────────────────────────────────
  # Publish GitHub Release
  # ─────────────────────────────────────────────
  release:
    name: Publish Release
    needs: [linux-binary, linux-flatpak]
    runs-on: ubuntu-24.04

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            tonearm-*.tar.gz
            dev.dergs.Tonearm.flatpak
