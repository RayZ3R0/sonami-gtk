name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ─────────────────────────────────────────────
  # Linux: native binary tarball
  # ─────────────────────────────────────────────
  linux-binary:
    name: Build binary (Linux x86_64)
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config \
            libgtk-4-dev \
            libadwaita-1-dev \
            libsecret-1-dev \
            libgstreamer1.0-dev \
            libgstreamer-plugins-base1.0-dev \
            gstreamer1.0-plugins-good \
            gstreamer1.0-plugins-bad \
            libglib2.0-bin \
            librsvg2-bin

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
          cache: true

      - name: Resolve version info
        id: ver
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          COMMIT="$(git rev-parse --short=7 HEAD)"
          echo "tag=${TAG}"         >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "commit=${COMMIT}"   >> "$GITHUB_OUTPUT"

      - name: Build binary
        env:
          CGO_ENABLED: "1"
          GOOS: linux
          GOARCH: amd64
        run: |
          go build \
            -ldflags="-s -w \
              -X 'github.com/RayZ3R0/sonami-gtk/internal/ui.Version=${{ steps.ver.outputs.version }}' \
              -X 'github.com/RayZ3R0/sonami-gtk/internal/ui.Commit=${{ steps.ver.outputs.commit }}'" \
            -trimpath \
            -o sonami \
            ./cmd/sonami

      - name: Compile GSettings schemas
        run: glib-compile-schemas internal/settings/

      - name: Bundle tarball
        run: |
          TAG="${{ steps.ver.outputs.tag }}"
          BUNDLE="sonami-gtk-${TAG}-linux-x86_64"
          mkdir -p "$BUNDLE/share/icons/hicolor/scalable/apps"
          mkdir -p "$BUNDLE/share/icons/hicolor/128x128/apps"
          mkdir -p "$BUNDLE/share/icons/hicolor/symbolic/apps"
          mkdir -p "$BUNDLE/share/applications"
          mkdir -p "$BUNDLE/share/glib-2.0/schemas"
          mkdir -p "$BUNDLE/share/metainfo"

          cp sonami "$BUNDLE/"
          cp build/io.github.rayz3r0.SonamiGtk.desktop "$BUNDLE/share/applications/"
          cp build/io.github.rayz3r0.SonamiGtk.metainfo.xml "$BUNDLE/share/metainfo/"
          cp internal/icons/hicolor/scalable/apps/io.github.rayz3r0.SonamiGtk.svg \
              "$BUNDLE/share/icons/hicolor/scalable/apps/"
          cp internal/icons/hicolor/128x128/apps/io.github.rayz3r0.SonamiGtk.png \
              "$BUNDLE/share/icons/hicolor/128x128/apps/"
          cp internal/icons/hicolor/symbolic/apps/io.github.rayz3r0.SonamiGtk-symbolic.svg \
              "$BUNDLE/share/icons/hicolor/symbolic/apps/"
          cp internal/settings/io.github.rayz3r0.SonamiGtk.gschema.xml \
              "$BUNDLE/share/glib-2.0/schemas/"

          cat > "$BUNDLE/README.txt" << 'EOF'
          Sonami — Linux portable build
          ================================
          Run ./sonami to launch.

          For a proper system install, copy the contents of share/ into
          /usr/local/share/ and run: glib-compile-schemas /usr/local/share/glib-2.0/schemas/
          EOF

          tar -czf "${BUNDLE}.tar.gz" "$BUNDLE"

      - name: Upload tarball
        uses: actions/upload-artifact@v4
        with:
          name: linux-binary
          path: "sonami-gtk-${{ steps.ver.outputs.tag }}-linux-x86_64.tar.gz"

  # ─────────────────────────────────────────────
  # Linux: Flatpak bundle (using upstream container)
  # ─────────────────────────────────────────────
  linux-flatpak:
    name: Build Flatpak (Linux x86_64)
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-49
      options: --privileged

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Add Flathub repo
        run: flatpak remote-add --user --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo

      - name: Cache Flatpak builder
        uses: actions/cache@v4
        with:
          path: ~/.local/share/flatpak
          key: flatpak-builder-${{ hashFiles('build/flatpak/io.github.rayz3r0.SonamiGtk.yaml', 'build/flatpak/go.mod.yml') }}
          restore-keys: |
            flatpak-builder-

      - name: Build Flatpak
        run: |
          flatpak-builder --user --repo=repo --disable-rofiles-fuse \
            --install-deps-from=flathub \
            --force-clean --default-branch=master \
            flatpak_app build/flatpak/io.github.rayz3r0.SonamiGtk.yaml

      - name: Create bundle
        run: |
          flatpak build-bundle repo io.github.rayz3r0.SonamiGtk.flatpak \
            --runtime-repo=https://flathub.org/repo/flathub.flatpakrepo \
            --arch=x86_64 io.github.rayz3r0.SonamiGtk master

      - name: Upload Flatpak
        uses: actions/upload-artifact@v4
        with:
          name: linux-flatpak
          path: io.github.rayz3r0.SonamiGtk.flatpak

  # ─────────────────────────────────────────────
  # Publish GitHub Release
  # ─────────────────────────────────────────────
  release:
    name: Publish Release
    needs: [linux-binary, linux-flatpak]
    runs-on: ubuntu-24.04

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            sonami-gtk-*.tar.gz
            io.github.rayz3r0.SonamiGtk.flatpak

  # ─────────────────────────────────────────────
  # Publish to AUR
  # ─────────────────────────────────────────────
  aur-publish:
    name: Update AUR package
    needs: [release]
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest

    steps:
      - name: Install dependencies
        run: |
          pacman -Syu --noconfirm base-devel git openssh

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure SSH for AUR
        run: |
          mkdir -p /root/.ssh
          echo "${{ secrets.AUR_SSH_PRIVATE_KEY }}" > /root/.ssh/aur_ed25519
          chmod 600 /root/.ssh/aur_ed25519
          ssh-keyscan -t ed25519 aur.archlinux.org >> /root/.ssh/known_hosts 2>/dev/null
          cat > /root/.ssh/config << 'SSHEOF'
          Host aur.archlinux.org
            IdentityFile /root/.ssh/aur_ed25519
            User aur
            StrictHostKeyChecking accept-new
          SSHEOF
          chmod 600 /root/.ssh/config

      - name: Update PKGBUILD
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          TARBALL_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/sonami-gtk-${TAG}-linux-x86_64.tar.gz"

          echo "==> Downloading tarball to compute sha256..."
          curl -fSL -o tarball.tar.gz "$TARBALL_URL"
          SHA256=$(sha256sum tarball.tar.gz | awk '{print $1}')
          rm tarball.tar.gz

          echo "==> Version: ${VERSION}"
          echo "==> SHA256:  ${SHA256}"

          cd aur

          # Update pkgver
          sed -i "s/^pkgver=.*/pkgver=${VERSION}/" PKGBUILD

          # Reset pkgrel to 1 for new version
          sed -i "s/^pkgrel=.*/pkgrel=1/" PKGBUILD

          # Update sha256sums
          sed -i "s/^sha256sums=.*/sha256sums=('${SHA256}')/" PKGBUILD

          echo "==> Updated PKGBUILD:"
          cat PKGBUILD

      - name: Generate .SRCINFO
        run: |
          cd aur

          # makepkg needs to run as non-root
          useradd -m builder
          chown -R builder:builder .
          su builder -c "makepkg --printsrcinfo" > .SRCINFO

          echo "==> Generated .SRCINFO:"
          cat .SRCINFO

      - name: Push to AUR
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"

          git config --global user.name "RayZ3R0"
          git config --global user.email "rayz3r0@users.noreply.github.com"

          # Clone existing AUR repo, or initialise a new one
          if git clone ssh://aur@aur.archlinux.org/sonami-gtk-bin.git /tmp/aur-repo 2>/dev/null; then
            echo "==> Cloned existing AUR repo"
          else
            echo "==> AUR repo doesn't exist yet, creating fresh"
            mkdir -p /tmp/aur-repo
            cd /tmp/aur-repo
            git init
            git remote add origin ssh://aur@aur.archlinux.org/sonami-gtk-bin.git
            cd -
          fi

          # Copy our generated files into the AUR repo
          cp aur/PKGBUILD /tmp/aur-repo/
          cp aur/.SRCINFO /tmp/aur-repo/

          cd /tmp/aur-repo
          git add PKGBUILD .SRCINFO
          git commit -m "Update to ${VERSION}"
          git push origin master
