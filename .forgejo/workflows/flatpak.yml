name: Flatpak

on:
  push:
    branches: [main]
  pull_request:

jobs:
  flatpak:
    name: Build Flatpak
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-49
      options: --privileged

    steps:
      - name: Checkout code
        uses: https://code.forgejo.org/actions/checkout@v4

      - name: Add Flathub repo
        run: flatpak remote-add --user --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo

      - name: Cache Flatpak builder
        uses: https://code.forgejo.org/actions/cache@v4
        with:
          path: ~/.local/share/flatpak
          key: flatpak-builder-${{ hashFiles('build/flatpak/dev.dergs.Sonami.yaml', 'build/flatpak/go.mod.yml') }}
          restore-keys: |
            flatpak-builder-

      - name: Build Flatpak
        run: |
          flatpak-builder --user --repo=repo --disable-rofiles-fuse \
            --install-deps-from=flathub \
            --force-clean --default-branch=master \
            flatpak_app build/flatpak/dev.dergs.Sonami.yaml

      - name: Create bundle
        run: |
          flatpak build-bundle repo dev.dergs.Sonami.flatpak \
            --runtime-repo=https://flathub.org/repo/flathub.flatpakrepo \
            --arch=x86_64 dev.dergs.Sonami master

      - name: Upload artifact
        uses: https://code.forgejo.org/forgejo/upload-artifact@v4
        with:
          name: dev.dergs.Sonami-x86_64.flatpak
          path: dev.dergs.Sonami.flatpak
          retention-days: ${{ github.ref == 'refs/heads/main' && 7 || 3 }}
